document.getElementById("footer-text").textContent=t.footer;
// Chat
document.getElementById("chat-sub").textContent=t.chatSub;
document.getElementById("chat-in").placeholder=t.chatPh;

}

function toggleLang(){lang=lang==="tr"?"en":"tr";document.documentElement.lang=lang;chatMsgs=[];addBotMsg(T[lang].chatWelcome);render();}
function toggleMob(){document.getElementById("mob-menu").classList.toggle("open");}

// Chat
let chatMsgs=[];
function addBotMsg(t){chatMsgs.push({f:"bot",t});renderChat();}
function addUserMsg(t){chatMsgs.push({f:"user",t});renderChat();}
function renderChat(){const el=document.getElementById("chat-msgs");el.innerHTML=chatMsgs.map(m=>`<div class="chat-msg ${m.f}">${m.t}</div>`).join("");el.scrollTop=el.scrollHeight;document.getElementById("quick-btns").style.display=chatMsgs.length<=1?"flex":"none";}
function sendChat(){const inp=document.getElementById("chat-in");const v=inp.value.trim();if(!v)return;inp.value="";addUserMsg(v);setTimeout(()=>addBotMsg(botReply(v)),500);}
function quickChat(q){addUserMsg(q);setTimeout(()=>addBotMsg(botReply(q)),500);}
function toggleChat(){chatOpen=!chatOpen;document.getElementById("chat-win").classList.toggle("open");const btn=document.getElementById("chat-toggle");btn.innerHTML=chatOpen?'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>':'<svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4V4c0-1.1-.9-2-2-2zm0 15.17L18.83 16H4V4h16v13.17zM7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/></svg>';}

// Scroll nav
window.addEventListener("scroll",()=>{document.getElementById("nav").classList.toggle("scrolled",window.scrollY>50);});
// Fade-in observer
const obs=new IntersectionObserver((entries)=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add("visible");obs.unobserve(e.target);}});},{threshold:0.1});
function observeFades(){document.querySelectorAll(".fade-in:not(.visible)").forEach(el=>obs.observe(el));}

// Init
addBotMsg(T.tr.chatWelcome);
render();
observeFades();
</script>
